<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootyScopeFG | Profesyonel Taktik Paneli</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f59e0b; --dark: #0d0d0d; --card: #161616; }
        body { background: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
        .hero-text h1 { font-size: 3rem; margin-bottom: 10px; background: linear-gradient(to right, #fff, var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-text p { color: #888; margin-bottom: 30px; }
        .login-card { background: var(--card); padding: 40px; border-radius: 20px; border: 1px solid #333; width: 350px; box-shadow: 0 10px 50px rgba(0,0,0,0.7); }
        h2 { color: var(--gold); margin-bottom: 20px; font-weight: 600; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: var(--gold); color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        button:hover { background: #d97706; transform: translateY(-2px); }
        .error-msg { color: #ff4444; font-size: 13px; margin-top: 15px; min-height: 20px; }
    </style>
</head>
<body>
    <div class="hero-text">
        <h1>FootyScope<span style="color:var(--gold)">FG</span></h1>
        <p>Profesyonel Antrenörler İçin Taktik ve Analiz Portalı</p>
    </div>
    <div class="login-card">
        <h2>Sisteme Giriş</h2>
        <input type="text" id="license-input" placeholder="Lisans Kodunuzu Giriniz (FS-XXXX-XXXX)">
        <button onclick="login()">Paneli Aç</button>
        <div id="error-msg" class="error-msg"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5WlQWhrTeX_Uc2MIseMUJ-Dp2KT0jyaQ",
            authDomain: "footyscopefg-df329.firebaseapp.com",
            projectId: "footyscopefg-df329",
            storageBucket: "footyscopefg-df329.firebasestorage.app",
            messagingSenderId: "1098459531879",
            appId: "1:1098459531879:web:6df8f70be1e360440662c2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        window.login = async () => {
            const code = document.getElementById('license-input').value.trim();
            const errorElement = document.getElementById('error-msg');
            if(!code) { errorElement.innerText = "Lütfen kodunuzu giriniz."; return; }
            
            errorElement.style.color = "#f59e0b";
            errorElement.innerText = "Doğrulanıyor...";
            
            try {
                await signInWithEmailAndPassword(auth, `${code}@footyscopefg.com`, "123456");
                window.location.href = "dashboard.html";
            } catch (error) {
                errorElement.style.color = "#ff4444";
                errorElement.innerText = "Hatalı veya Süresi Dolmuş Lisans!";
            }
        };
    </script>
</body>
</html>
