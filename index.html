<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootyScopeFG | Giriş</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #0d0d0d; color: #fff; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #161616; padding: 40px; border-radius: 20px; border: 1px solid #333; text-align: center; width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #f59e0b; margin-bottom: 25px; font-size: 24px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; box-sizing: border-box; text-align: center; font-size: 16px; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #f59e0b; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        button:hover { background: #d97706; }
        .error-msg { color: #ff4444; font-size: 12px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>FootyScopeFG</h2>
        <input type="text" id="license-input" placeholder="FS-XXXX-XXXX">
        <button onclick="login()">Giriş Yap</button>
        <div id="error-msg" class="error-msg"></div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        const firebaseConfig = {
            apiKey: "AIzaSyB5WlQWhrTeX_Uc2MIseMUJ-Dp2KT0jyaQ",
            authDomain: "footyscopefg-df329.firebaseapp.com",
            projectId: "footyscopefg-df329",
            storageBucket: "footyscopefg-df329.firebasestorage.app",
            messagingSenderId: "1098459531879",
            appId: "1:1098459531879:web:6df8f70be1e360440662c2"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window.login = async () => {
            const code = document.getElementById('license-input').value.trim();
            if(!code) return;
            try {
                await signInWithEmailAndPassword(auth, `${code}@footyscopefg.com`, "123456");
                window.location.href = "dashboard.html";
            } catch (error) {
                document.getElementById('error-msg').innerText = "Hatalı Lisans!";
            }
        };
    </script>
</body>
</html>
