<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootyScopeFG | Profesyonel Taktik Portalı</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --gold: #f59e0b; --bg: #0d0d0d; --card: #161616; --border: #333; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); font-family: 'Poppins', sans-serif; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .login-container { background: var(--card); border: 1px solid var(--border); padding: 50px; border-radius: 24px; width: 400px; text-align: center; position: relative; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .login-container::before { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; background: linear-gradient(45deg, var(--gold), transparent, var(--gold)); border-radius: 24px; z-index: -1; opacity: 0.3; }
        .logo h1 { font-size: 32px; color: #fff; margin-bottom: 10px; font-weight: 700; letter-spacing: 1px; }
        .logo span { color: var(--gold); }
        .logo p { color: #666; font-size: 14px; margin-bottom: 35px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: 1px solid var(--border); background: #1a1a1a; color: #fff; font-size: 16px; text-align: center; transition: 0.3s; }
        input:focus { border-color: var(--gold); outline: none; background: #222; }
        button { width: 100%; padding: 15px; border-radius: 12px; border: none; background: var(--gold); color: #000; font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.4s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #d97706; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); }
        .error-msg { color: #ff4444; font-size: 13px; margin-top: 15px; font-weight: 500; height: 20px; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>FootyScope<span>FG</span></h1>
            <p>Modern Futbolun Analiz Merkezi</p>
        </div>
        <input type="text" id="license-input" placeholder="LİSANS KODUNUZU GİRİNİZ">
        <button onclick="login()">Sisteme Bağlan</button>
        <div id="error-msg" class="error-msg"></div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        const firebaseConfig = {
            apiKey: "AIzaSyB5WlQWhrTeX_Uc2MIseMUJ-Dp2KT0jyaQ",
            authDomain: "footyscopefg-df329.firebaseapp.com",
            projectId: "footyscopefg-df329",
            storageBucket: "footyscopefg-df329.firebasestorage.app",
            messagingSenderId: "1098459531879",
            appId: "1:1098459531879:web:6df8f70be1e360440662c2"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        window.login = async () => {
            const code = document.getElementById('license-input').value.trim();
            const errorDiv = document.getElementById('error-msg');
            if(!code) return;
            try {
                await signInWithEmailAndPassword(auth, `${code}@footyscopefg.com`, "123456");
                window.location.href = "dashboard.html";
            } catch (error) {
                errorDiv.innerText = "Hatalı veya Süresi Dolmuş Lisans Anahtarı!";
            }
        };
    </script>
</body>
</html>
