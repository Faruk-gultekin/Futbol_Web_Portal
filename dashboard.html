<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootyScopeFG | Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #f59e0b; --dark: #0d0d0d; --card: #161616; --border: #333; }
        body { background: var(--dark); color: #fff; font-family: 'Poppins', sans-serif; margin: 0; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: #111; padding: 30px 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .sidebar-logo h2 { font-size: 22px; margin-bottom: 40px; border-bottom: 2px solid var(--gold); padding-bottom: 10px; }
        .main-content { flex-grow: 1; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); border-radius: 15px; padding: 25px; border: 1px solid var(--border); position: relative; }
        .card::before { content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--gold); }
        .btn { display: block; width: 100%; padding: 12px; margin-top: 15px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-win { background: var(--gold); color: #000; }
        .btn-mac { border: 1px solid var(--gold); color: var(--gold); }
        .btn-wp { background: #25D366; color: #fff; }
        .gold-text { color: var(--gold); font-weight: bold; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo"><h2>FootyScope<span>FG</span></h2></div>
        <nav style="display:flex; flex-direction:column; gap:15px;">
            <a href="#" style="color:var(--gold); text-decoration:none;">🏠 Ana Panel</a>
            <a href="#" onclick="logout()" style="color:#ff4444; text-decoration:none; margin-top:30px;">🚪 Çıkış Yap</a>
        </nav>
    </div>
    <div class="main-content">
        <h1>Hoş Geldin, <span class="gold-text">Hocam</span></h1>
        <div class="grid">
            <div class="card">
                <h3>Yazılım İndir (v1.1)</h3>
                <p>Lisans hatası giderilmiş güncel sürümler:</p>
                <a href="https://docs.google.com/uc?export=download&id=16u5yZ9WvPcr1bPnx9GemPI6GYIR3Y48q" class="btn btn-win">Windows (EXE)</a>
                <a href="https://docs.google.com/uc?export=download&id=1wOv1-afhqzg32IpmWh7MimFL-D0PskHY" class="btn btn-mac">Mac (.APP)</a>
            </div>
            <div class="card">
                <h3>Lisans Bilgisi</h3>
                <p>Durum: <span class="gold-text">Aktif</span></p>
                <p>Kalan Süre: <span id="days-count" class="gold-text">30</span> Gün</p>
            </div>
            <div class="card">
                <h3>Teknik Destek</h3>
                <p>Bir sorun mu var? Anında bize ulaşın:</p>
                <a href="https://wa.me/905436688555" class="btn btn-wp">WhatsApp Destek</a>
            </div>
        </div>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        const firebaseConfig = {
            apiKey: "AIzaSyB5WlQWhrTeX_Uc2MIseMUJ-Dp2KT0jyaQ",
            authDomain: "footyscopefg-df329.firebaseapp.com",
            projectId: "footyscopefg-df329",
            storageBucket: "footyscopefg-df329.firebasestorage.app",
            messagingSenderId: "1098459531879",
            appId: "1:1098459531879:web:6df8f70be1e360440662c2"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        onAuthStateChanged(auth, (user) => { if (!user) window.location.href = "index.html"; });
        window.logout = () => { signOut(auth).then(() => { window.location.href = "index.html"; }); };
    </script>
</body>
</html>
